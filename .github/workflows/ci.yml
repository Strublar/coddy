name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ['20']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify project structure
        run: |
          test -f src/bot/index.js
          test -f src/orchestrator/index.js
          test -f src/claude/index.js
          test -f src/github/index.js
          test -f src/utils/taskStore.js
          test -f src/utils/logger.js
          echo "✓ All expected project files present"
      
      - name: Check for syntax errors
        run: node --check src/bot/index.js src/orchestrator/index.js src/claude/index.js src/github/index.js
      
      - name: Verify ESM module structure
        run: |
          grep -q '"type":\s*"module"' package.json
          echo "✓ ESM modules correctly configured"
      
      - name: Verify environment configuration
        run: |
          test -f .env.example || echo "Note: .env.example not found (optional)"
          echo "✓ Configuration check complete"
      
      - name: Run basic linting
        run: |
          echo "Checking for common issues..."
          ! grep -r "require(" src/ --include="*.js" || echo "Warning: CommonJS require found in ESM project"
          echo "✓ Linting checks complete"
