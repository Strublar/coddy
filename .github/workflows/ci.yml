name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: ['20']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify Claude CLI is available
        run: which claude || echo "Warning: claude CLI not found in PATH (expected in production environment)"
      
      - name: Check syntax
        run: npm run start -- --help 2>&1 || true
        continue-on-error: true
      
      - name: Run tests
        run: npm test
        continue-on-error: true
